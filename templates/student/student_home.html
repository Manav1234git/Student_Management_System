<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <h1 class="text-3xl font-bold text-center mb-8">Student Management</h1>

    <!-- Add Student Button -->
    <div class="text-center mb-6">
        <a href="{% url 'add_student' %}" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
            Add Student
        </a>
    </div>

    <!-- Cards Container -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Card 1 -->
         {% for student in student_data %}
        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h2 class="text-xl font-semibold mb-2">{{ student.name }}</h2>
            <p class="text-gray-600">Email: {{ student.email }}</p>
            <p class="text-gray-600 mb-4">Phone: {{ student.phone_no }}</p>

            <div class="flex justify-between">
                <a href="{% url 'update_student' student.id %}"class="bg-yellow-400 px-4 py-1 rounded hover:bg-yellow-500">Edit</a>
                <a href="{% url 'delete_student' student.id %}"class="bg-red-500 text-white px-4 py-1 rounded hover:bg-red-600">Delete</a>
            </div>
        </div>
        {% endfor %}

    </div>

</body>
</html>
