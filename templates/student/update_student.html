<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        
        <h2 class="text-2xl font-bold text-center mb-6">Update Student</h2>

        <form method="POST">

            {% csrf_token %}
            <!-- Name -->
            <div class="mb-4">
                <label class="block text-gray-700 mb-1">Name</label>
                <input type="text" name="input_name" value="{{ student.name }}" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label class="block text-gray-700 mb-1">Email</label>
                <input type="email" name="input_email" value="{{ student.email }}" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Phone -->
            <div class="mb-6">
                <label class="block text-gray-700 mb-1">Phone Number</label>
                <input type="text" name="input_phone_no" value="{{ student.phone_no }}" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Buttons -->
            <div class="flex justify-between items-center">
                
                <button type="button" 
                    class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">
                    ← Back
                </button>

                <button type="submit" 
                    class="bg-yellow-500 text-white px-6 py-2 rounded-lg hover:bg-yellow-600">
                    Update
                </button>

            </div>

        </form>
    </div>

</body>
</html>
