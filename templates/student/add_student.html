<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        
        <h2 class="text-2xl font-bold text-center mb-6">Add Student</h2>

        <form method="POST" action="">
            {% csrf_token %}

            <!-- Name -->
            <div class="mb-4">
                <label class="block text-gray-700 mb-1">Name</label>
                <input type="text" name="input_name" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label class="block text-gray-700 mb-1">Email</label>
                <input type="email" name="input_email" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Phone -->
            <div class="mb-6">
                <label class="block text-gray-700 mb-1">Phone Number</label>
                <input type="text" name="input_phone_no" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Buttons -->
            <div class="flex justify-between items-center">
                
                <!-- Back Button (add your link here) -->
                <a href="{% url 'student_home' %}" 
                   class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">
                    ← Back
                </a>

                <div class="flex gap-2">
                    <a href="/" class="bg-gray-400 text-white px-4 py-2 rounded-lg hover:bg-gray-500">
                        Cancel
                    </a>
                    <button type="submit" 
                        class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
                        Save
                    </button>
                </div>

            </div>

        </form>
    </div>

</body>
</html>
